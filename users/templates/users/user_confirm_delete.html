{% extends "base.html" %}

{% block title %}Delete User{% endblock %}

{% block content %}
<div class="card content-card">
    <div class="card-body p-4 p-lg-5">
        <h2 class="h3 mb-3">Delete User</h2>
        <p class="text-muted">
            Are you sure you want to delete <strong>{{ managed_user.get_full_name|default:managed_user.username }}</strong>?
        </p>
        <form method="post" class="d-flex gap-2">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete User</button>
            <a href="{% url 'admin_user_management' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
