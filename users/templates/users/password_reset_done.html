{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Sent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background:
                linear-gradient(rgba(15, 23, 42, 0.58), rgba(15, 23, 42, 0.58)),
                url("{% static 'images/auth-bg.jpg' %}") center center / cover no-repeat;
        }
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .auth-card {
            width: 100%;
            max-width: 460px;
            border: 0;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.95);
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="card auth-card shadow-lg">
            <div class="card-body p-4 p-md-5 text-center">
                <h2 class="h3 mb-2">Check Your Email</h2>
                <p class="text-muted mb-0">If an account exists for that email, a password reset link has been sent.</p>
            </div>
        </div>
    </div>
</body>
</html>
