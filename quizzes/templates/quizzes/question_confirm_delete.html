{% extends "base.html" %}

{% block title %}Delete Question{% endblock %}

{% block content %}
<div class="card content-card">
    <div class="card-body p-4 p-lg-5">
        <h2 class="h3 mb-3">Delete Question</h2>
        <p class="text-muted">Are you sure you want to delete this question?</p>
        <form method="post" class="d-flex gap-2">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete Question</button>
            <a href="{% url 'quiz_manage' course.pk chapter.pk %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
