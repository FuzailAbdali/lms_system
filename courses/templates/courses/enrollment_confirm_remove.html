{% extends "base.html" %}

{% block title %}Remove Enrollment{% endblock %}

{% block content %}
<div class="card content-card">
    <div class="card-body p-4 p-lg-5">
        <h2 class="h3 mb-3">Remove Enrollment</h2>
        <p class="text-muted">
            Are you sure you want to remove
            <strong>{{ enrollment.student.get_full_name|default:enrollment.student.username }}</strong>
            from <strong>{{ enrollment.course.title }}</strong>?
        </p>
        <form method="post" class="d-flex gap-2">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Remove Enrollment</button>
            <a href="{% url 'enrollment_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
