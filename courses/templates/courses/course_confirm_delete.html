{% extends "base.html" %}

{% block title %}Delete Course{% endblock %}

{% block content %}
<div class="card content-card">
    <div class="card-body p-4 p-lg-5">
        <h2 class="h3 mb-3">Delete Course</h2>
        <p class="text-muted">Are you sure you want to delete <strong>{{ course.title }}</strong>? This action cannot be undone.</p>
        <form method="post" class="d-flex gap-2">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'course_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
