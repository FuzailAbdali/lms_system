{% extends "base.html" %}

{% block title %}Delete Chapter{% endblock %}

{% block content %}
<div class="card content-card">
    <div class="card-body p-4 p-lg-5">
        <h2 class="h3 mb-3">Delete Chapter</h2>
        <p class="text-muted">
            Are you sure you want to delete <strong>{{ chapter.title }}</strong> from <strong>{{ course.title }}</strong>?
        </p>
        <form method="post" class="d-flex gap-2">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete Chapter</button>
            <a href="{% url 'chapter_list' course.pk %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
